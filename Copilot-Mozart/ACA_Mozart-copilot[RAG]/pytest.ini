[pytest]
markers =
    integration: marks tests as integration tests (requires LLM/API)
    unit: marks tests as unit tests (no external dependencies)
    live: marks tests as live golden tests (requires real services, post-deploy only)

asyncio_mode = auto

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default: run all tests
# To run only unit tests: pytest -m "not integration"
# To run only integration tests: pytest -m integration
# To run golden tests: ENABLE_LIVE_TESTS=true pytest -m live

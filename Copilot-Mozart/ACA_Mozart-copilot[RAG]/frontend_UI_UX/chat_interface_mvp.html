<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACA Mozart Chat Interface</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bgPrimary: '#0D0D0D',
                        bgSecondary: '#1A1A1A',
                        bgInput: '#2D2D2D',
                        textPrimary: '#FFFFFF',
                        textSecondary: '#A0A0A0',
                        accentMozart: '#6366F1', // Indigo
                        accentAmadeus: '#A855F7', // Purple
                        userBubble: '#3B82F6', // Blue
                        botBubble: '#374151', // Gray
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans Thai', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
            background-color: #0D0D0D;
            color: #FFFFFF;
            overflow: hidden;
            position: relative;
        }

        /* --- Aurora Glow Background --- */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 90%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }
        
        /* Ensure content is above the glow */
        .content-wrapper {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1A1A1A; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* --- Markdown & Table Styles --- */
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body ul { list-style-type: disc; margin-left: 20px; margin-bottom: 0.75em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 20px; margin-bottom: 0.75em; }
        .markdown-body pre { background: #111; padding: 12px; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
        .markdown-body code { font-family: monospace; background: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 4px; }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1em;
            border-radius: 8px;
            overflow: hidden;
        }
        .markdown-body th, .markdown-body td {
            padding: 10px 14px;
            border: 1px solid #444;
            text-align: left;
        }
        .markdown-body th {
            background-color: #2D2D2D;
            font-weight: 600;
        }
        .markdown-body tr:nth-child(even) {
            background-color: #2c333d;
        }

        /* --- Animations & Effects --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-enter { animation: fadeIn 0.3s ease-out forwards; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); }
        }
        .thinking-dot { animation: bounce 1.4s infinite ease-in-out; }
        .thinking-dot:nth-child(1) { animation-delay: 0s; }
        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
        
        /* --- Copy Button Style --- */
        .message-actions {
            position: absolute;
            top: 4px;
            right: 8px;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
        }
        .message-bubble:hover .message-actions {
            opacity: 1;
        }

    </style>
</head>
<body>
<div class="content-wrapper">

    <!-- 1. Header -->
    <header class="h-16 border-b border-gray-800 bg-bgSecondary/80 backdrop-blur-sm flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-accentMozart to-accentAmadeus flex items-center justify-center text-white font-bold shadow-lg shadow-purple-900/20">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-lg font-semibold tracking-wide">ACA Mozart</h1>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-xs text-textSecondary" id="connection-status">Online</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="clear-chat-btn" title="Clear Chat" class="p-2 rounded-lg hover:bg-white/5 transition-colors text-textSecondary hover:text-white">
                <i data-lucide="trash-2" class="w-6 h-6"></i>
            </button>
            <button onclick="openSettings()" title="Settings" class="p-2 rounded-lg hover:bg-white/5 transition-colors text-textSecondary hover:text-white">
                <i data-lucide="settings" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <!-- 2. Chat Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 scroll-smooth">
        <!-- Initial Welcome block will be injected here by JS -->
    </main>

    <!-- 3. Input Area -->
    <footer class="bg-bgSecondary/80 backdrop-blur-sm border-t border-gray-800 p-4 shrink-0">
        <div class="max-w-3xl mx-auto relative">
            <div class="flex gap-3 items-end bg-bgInput p-2 rounded-xl border border-gray-700 focus-within:border-accentMozart transition-colors shadow-lg">
                <textarea 
                    id="user-input"
                    rows="1"
                    class="flex-1 bg-transparent text-white placeholder-gray-500 px-3 py-2 focus:outline-none resize-none max-h-32"
                    placeholder="พิมพ์ข้อความ... (เช่น \'ออกแบบไฟห้องครัว\')"
                ></textarea>
                <button id="send-btn" class="p-2.5 rounded-lg bg-accentMozart hover:bg-indigo-600 text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="text-center mt-2">
                 <span class="text-[10px] text-gray-600">Powered by ACA Mozart Gateway (Port 8000)</span>
            </div>
        </div>
    </footer>

    <!-- 4. API Key Modal -->
    <div id="api-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-bgSecondary border border-gray-700 rounded-2xl p-8 w-[90%] max-w-md shadow-2xl transform transition-all scale-100">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-bgInput rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="key" class="w-8 h-8 text-accentAmadeus"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2">Authentication Required</h2>
                <p class="text-textSecondary text-sm">กรุณาใส่ API Key เพื่อเข้าใช้งานระบบ (เก็บในเครื่องของคุณเท่านั้น)</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1 ml-1">GATEWAY / GOOGLE API KEY</label>
                    <input type="password" id="api-key-input" class="w-full bg-bgInput border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-accentAmadeus transition-colors" placeholder="sk-...">
                </div>
                <button id="save-api-key" class="w-full bg-gradient-to-r from-accentMozart to-accentAmadeus text-white font-bold py-3 rounded-xl hover:opacity-90 transition-opacity shadow-lg shadow-purple-900/30">
                    เข้าสู่ระบบ
                </button>
                <p id="api-error" class="text-red-500 text-xs text-center hidden">กรุณากรอก API Key ก่อนดำเนินการต่อ</p>
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script>
        // --- Configuration ---
        const GATEWAY_URL = 'http://localhost:8000';
        const STORAGE_KEY = 'aca_mozart_api_key';

        // --- DOM Elements ---
        const els = {
            chatContainer: document.getElementById('chat-container'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            apiModal: document.getElementById('api-modal'),
            apiKeyInput: document.getElementById('api-key-input'),
            saveKeyBtn: document.getElementById('save-api-key'),
            apiError: document.getElementById('api-error'),
            connectionStatus: document.getElementById('connection-status'),
            clearChatBtn: document.getElementById('clear-chat-btn'),
        };

        // --- State ---
        let state = {
            apiKey: localStorage.getItem(STORAGE_KEY) || '',
            isTyping: false,
            messages: []
        };

        // --- Initial Render ---
        renderWelcomeMessage();
        lucide.createIcons();
        checkAuth();
        els.userInput.focus();

        // --- Event Listeners ---
        els.userInput.addEventListener('input', () => {
            els.userInput.style.height = 'auto';
            els.userInput.style.height = (els.userInput.scrollHeight) + 'px';
        });

        els.userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        els.sendBtn.addEventListener('click', handleSend);
        els.clearChatBtn.addEventListener('click', clearChat);

        els.saveKeyBtn.addEventListener('click', () => {
            const key = els.apiKeyInput.value.trim();
            if (key) {
                state.apiKey = key;
                localStorage.setItem(STORAGE_KEY, key);
                els.apiModal.classList.add('hidden');
                els.userInput.focus();
            } else {
                els.apiError.classList.remove('hidden');
            }
        });

        // --- Functions ---

        function checkAuth() {
            if (!state.apiKey) {
                els.apiModal.classList.remove('hidden');
            } else {
                els.apiModal.classList.add('hidden');
            }
        }
        
        function openSettings() {
            els.apiKeyInput.value = state.apiKey;
            els.apiModal.classList.remove('hidden');
        }

        function scrollToBottom() {
            els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
        }
        
        function clearChat() {
            state.messages = [];
            els.chatContainer.innerHTML = '';
            renderWelcomeMessage();
            lucide.createIcons();
        }

        function renderWelcomeMessage() {
            const welcomeBlock = document.createElement('div');
            welcomeBlock.className = 'msg-enter';
            welcomeBlock.innerHTML = `
                <div class="flex gap-4 max-w-3xl mx-auto">
                    <div class="w-8 h-8 rounded-full bg-bgSecondary border border-gray-700 flex items-center justify-center shrink-0 mt-1">
                        <i data-lucide="bot" class="w-5 h-5 text-accentMozart"></i>
                    </div>
                    <div class="space-y-3">
                         <div class="flex items-center gap-2">
                            <span class="text-sm font-medium text-textSecondary">System</span>
                        </div>
                        <div class="bg-botBubble text-gray-100 px-4 py-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] md:max-w-[75%] leading-relaxed">
                            สวัสดีค่ะ! Drafta (ในร่าง Avatar) พร้อมรับคำสั่งแล้วค่ะ 🤖<br>
                            ลองใช้คำสั่งตัวอย่าง หรือพิมพ์คำถามที่ต้องการได้เลย
                        </div>
                    </div>
                </div>
                <!-- Suggestion Chips -->
                <div class="max-w-3xl mx-auto pl-12 mt-4 flex flex-wrap gap-2" id="suggestion-chips">
                    <button class="suggestion-chip">ออกแบบไฟห้องนอน 3x4 เมตร</button>
                    <button class="suggestion-chip">คำนวณโหลดครัวหนัก มีเตาไฟฟ้า</button>
                    <button class="suggestion-chip">หาขนาดสายเมนสำหรับบ้าน 2 ชั้น</button>
                </div>
            `;
            els.chatContainer.appendChild(welcomeBlock);
            
            // Add event listeners to new chips
            document.querySelectorAll('.suggestion-chip').forEach(chip => {
                chip.className = 'bg-bgInput hover:bg-gray-700 text-textSecondary text-sm py-1.5 px-3 rounded-full transition-colors';
                chip.addEventListener('click', () => {
                    els.userInput.value = chip.textContent;
                    els.userInput.focus();
                    handleSend();
                });
            });
        }
        
        function copyToClipboard(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                const icon = button.querySelector('i');
                icon.setAttribute('data-lucide', 'check');
                lucide.createIcons();
                setTimeout(() => {
                    icon.setAttribute('data-lucide', 'copy');
                    lucide.createIcons();
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
        
        function createThinkingBubble() {
            const div = document.createElement('div');
            div.id = 'thinking-bubble';
            div.className = 'flex gap-4 max-w-3xl mx-auto msg-enter';
            div.innerHTML = \`
                <div class="w-8 h-8 rounded-full bg-bgSecondary border border-gray-700 flex items-center justify-center shrink-0 mt-1">
                     <i data-lucide="bot" class="w-5 h-5 text-gray-400"></i>
                </div>
                <div class="space-y-1">
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-medium text-textSecondary">Bot</span>
                    </div>
                    <div class="bg-botBubble text-gray-100 px-4 py-3 rounded-2xl rounded-tl-none shadow-sm inline-block">
                        <div class="flex gap-1">
                            <div class="w-2 h-2 bg-gray-400 rounded-full thinking-dot"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full thinking-dot"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full thinking-dot"></div>
                        </div>
                    </div>
                </div>
            \`;
            els.chatContainer.appendChild(div);
            lucide.createIcons();
            scrollToBottom();
            return div;
        }

        function createMessageBubble(role, content, mode = null) {
            const isUser = role === 'user';
            
            const div = document.createElement('div');
            div.className = \`flex gap-4 max-w-3xl mx-auto msg-enter \${isUser ? 'flex-row-reverse' : ''}\`;
            
            const avatar = isUser ? \`
                <div class="w-8 h-8 rounded-full bg-userBubble flex items-center justify-center shrink-0 mt-1 shadow-lg shadow-blue-900/30">
                    <i data-lucide="user" class="w-5 h-5 text-white"></i>
                </div>
            \` : \`
                <div class="w-8 h-8 rounded-full bg-bgSecondary border border-gray-700 flex items-center justify-center shrink-0 mt-1">
                    <i data-lucide="bot" class="w-5 h-5 \${mode === 'AMADEUS' ? 'text-accentAmadeus' : 'text-accentMozart'}"></i>
                </div>
            \`;

            const name = isUser ? 'You' : (mode ? mode : 'System');
            const bubbleColor = isUser ? 'bg-userBubble' : 'bg-botBubble';
            const borderRadius = isUser ? 'rounded-tr-none' : 'rounded-tl-none';
            
            let formattedContent;
            if (isUser) {
                formattedContent = content.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\\n/g, "<br>");
            } else {
                formattedContent = marked.parse(content);
            }

            const badge = mode ? \`
                <span class="text-[10px] px-1.5 py-0.5 rounded border \${
                    mode === 'AMADEUS' 
                    ? 'border-purple-500/50 text-purple-300 bg-purple-900/20' 
                    : 'border-indigo-500/50 text-indigo-300 bg-indigo-900/20'
                }">\${mode}</span>
            \` : '';
            
            const copyButton = isUser ? '' : \`
                <div class="message-actions">
                    <button onclick="copyToClipboard(this, \`\${content.replace(/\\`/g, '\\\\`')}\`)" title="Copy" class="p-1.5 rounded-md hover:bg-white/10 text-textSecondary transition-colors">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>
            \`;

            div.innerHTML = \`
                \${avatar}
                <div class="space-y-1 max-w-[85%] md:max-w-[75%]">
                    <div class="flex items-center gap-2 \${isUser ? 'flex-row-reverse' : ''}">
                        <span class="text-sm font-medium text-textSecondary">\${name}</span>
                        \${badge}
                    </div>
                    <div class="relative message-bubble">
                        <div class="\${bubbleColor} text-gray-100 px-4 py-3 rounded-2xl \${borderRadius} shadow-sm leading-relaxed markdown-body break-words">
                            \${formattedContent}
                        </div>
                        \${copyButton}
                    </div>
                </div>
            \`;
            
            return div;
        }

        async function handleSend() {
            const text = els.userInput.value.trim();
            if (!text || state.isTyping) return;

            // Remove suggestion chips after first message
            const chips = document.getElementById('suggestion-chips');
            if (chips) chips.remove();

            els.chatContainer.appendChild(createMessageBubble('user', text));
            state.messages.push({role: 'user', content: text});
            
            els.userInput.value = '';
            els.userInput.style.height = 'auto';
            scrollToBottom();
            
            state.isTyping = true;
            els.sendBtn.disabled = true;

            const thinkingBubble = createThinkingBubble();

            try {
                const response = await fetch(\`\${GATEWAY_URL}/orchestrate\`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': state.apiKey },
                    body: JSON.stringify({ input: text })
                });

                if (!response.ok) throw new Error(\`Server Error: \${response.status}\`);

                const data = await response.json();
                
                thinkingBubble.remove();
                
                let botMessage = "No response data.";
                if (data.data && data.data.answer) botMessage = data.data.answer;
                else if (data.data && data.data.response) botMessage = data.data.response;
                else if (typeof data.data === 'string') botMessage = data.data;
                else botMessage = \`\`\`json\\n\${JSON.stringify(data.data, null, 2)}\\n\`\`\`\`;
                
                els.chatContainer.appendChild(createMessageBubble('bot', botMessage, data.mode));
                state.messages.push({role: 'bot', content: botMessage, mode: data.mode});

            } catch (error) {
                thinkingBubble.remove();
                const errorMessage = \`⚠️ Error: \${error.message}\\n(Make sure Gateway is running at \${GATEWAY_URL})\`;
                els.chatContainer.appendChild(createMessageBubble('bot', errorMessage, 'SYSTEM'));
                state.messages.push({role: 'bot', content: errorMessage, mode: 'SYSTEM'});
                console.error(error);
            } finally {
                state.isTyping = false;
                els.sendBtn.disabled = false;
                lucide.createIcons();
                scrollToBottom();
                els.userInput.focus();
            }
        }
    </script>
</div>
</body>
</html>

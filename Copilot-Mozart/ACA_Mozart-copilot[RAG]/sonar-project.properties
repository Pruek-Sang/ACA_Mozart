# SonarQube Project Configuration
# Exclude Python standard library and virtual environment files

sonar.exclusions=**/_pydatetime.py,**/site-packages/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/node_modules/**

# Only analyze our source code
sonar.sources=app,core,tests,scripts
sonar.tests=tests

# Python specific
sonar.python.version=3.12

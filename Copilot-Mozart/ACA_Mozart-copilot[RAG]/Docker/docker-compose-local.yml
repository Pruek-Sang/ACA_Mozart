# ═══════════════════════════════════════════════════════════════════
# Mozart Full Stack - Docker Compose (Local Development with BigDrive)
# ═══════════════════════════════════════════════════════════════════
# Services:
#   1. mozart-rag (port 8080) - RAG Spec Engine with AI
#   2. mcp-core (port 5001) - Electrical Calculation Engine
# 
# DATA STORAGE: Uses /mnt/BigDrive for heavy data (vector_db, logs)
# to avoid filling up the small Ubuntu root partition.
# ═══════════════════════════════════════════════════════════════════

services:
  # ═══════════════════════════════════════════════════════════════════
  # MCP Core v2 - Electrical Calculation Engine
  # ═══════════════════════════════════════════════════════════════════
  mcp-core:
    container_name: mcp-core-v2
    build:
      context: /mnt/BigDrive/Linux_Work/ACA_Mozart/mcp_core_v2
      dockerfile: Docker/Dockerfile
    image: mcp-core:2.0.0
    
    ports:
      - "5001:5001"
    
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=5001
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    
    volumes:
      # Logs and output on BigDrive
      - /mnt/BigDrive/Linux_Work/ACA_Mozart/mcp_core_v2/logs:/app/logs
      - /mnt/BigDrive/Linux_Work/ACA_Mozart/mcp_core_v2/output:/app/output
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - mozart-network

  # ═══════════════════════════════════════════════════════════════════
  # Mozart RAG - AI-Powered Spec Engine
  # ═══════════════════════════════════════════════════════════════════
  mozart-rag:
    container_name: mozart-rag-aca
    build:
      context: /mnt/BigDrive/Linux_Work/ACA_Mozart/Copilot-Mozart/ACA_Mozart-copilot[RAG]
      dockerfile: Docker/Dockerfile_light
    image: mozart-rag:3.2.1
    
    depends_on:
      mcp-core:
        condition: service_healthy
    
    ports:
      - "8080:8080"
    
    env_file:
      - .env_ACA
    
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - PYTHONUNBUFFERED=1
      # MCP Core connection (Docker internal network)
      - MCP_CORE_URL=http://mcp-core:5001
    
    volumes:
      # Heavy data on BigDrive (not copied into image)
      - /mnt/BigDrive/Linux_Work/ACA_Mozart/Copilot-Mozart/ACA_Mozart-copilot[RAG]/vector_db:/app/vector_db
      - /mnt/BigDrive/Linux_Work/ACA_Mozart/Copilot-Mozart/ACA_Mozart-copilot[RAG]/logs:/app/logs
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - mozart-network

# Define networks
networks:
  mozart-network:
    driver: bridge
    name: mozart-fullstack-network

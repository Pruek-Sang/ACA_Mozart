# ═══════════════════════════════════════════════════════════════════
# Mozart RAG Docker Compose - Orchestration Configuration
# ═══════════════════════════════════════════════════════════════════
# Philosophy: Ordo ab Chao - Order from Chaos
# Purpose: Simple single-service deployment for MVP
# ═══════════════════════════════════════════════════════════════════

version: '3.8'

services:
  mozart-rag:
    container_name: mozart-rag-aca
    build:
      context: ..
      dockerfile: Docker/Dockerfile_ACA
    image: mozart-rag:3.2.0
    
    # Port mapping
    ports:
      - "8080:8080"
    
    # Environment variables (override with .env_ACA file)
    env_file:
      - .env_ACA
    
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - PYTHONUNBUFFERED=1
      # LLM Provider - set one of these in .env_ACA:
      # - GOOGLE_API_KEY (for Google AI - simpler)
      # - PROJECT_ID + LOCATION (for Vertex AI - enterprise)
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits (optional - uncomment for production)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 4G
    #     reservations:
    #       cpus: '1.0'
    #       memory: 2G
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Networks
    networks:
      - mozart-network

# Define networks
networks:
  mozart-network:
    driver: bridge
    name: mozart-rag-network

# Optional: Volumes for future use (e.g., persistent vector DB)
# volumes:
#   mozart-vector-db:
#     name: mozart-vector-db
#   mozart-logs:
#     name: mozart-logs

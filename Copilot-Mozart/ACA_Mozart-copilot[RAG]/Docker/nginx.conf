# ═══════════════════════════════════════════════════════════════════════════
# NGINX Configuration for Mozart Chat Frontend
# ═══════════════════════════════════════════════════════════════════════════
# Security Features:
#   ✅ Security Headers (XSS, Clickjacking, MIME-sniffing protection)
#   ✅ Rate Limiting
#   ✅ Gzip Compression
#   ✅ Caching for static assets
#   ✅ Proxy to Gateway API
# ═══════════════════════════════════════════════════════════════════════════

# Performance tuning
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ═══════════════════════════════════════════════════════════════════
    # BASIC SETTINGS
    # ═══════════════════════════════════════════════════════════════════
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ═══════════════════════════════════════════════════════════════════
    # SECURITY SETTINGS
    # ═══════════════════════════════════════════════════════════════════
    # Hide NGINX version
    server_tokens off;

    # Buffer size limits (prevent buffer overflow attacks)
    client_body_buffer_size     16k;
    client_header_buffer_size   1k;
    client_max_body_size        8m;
    large_client_header_buffers 4 8k;

    # Timeouts (prevent slow attacks)
    client_body_timeout   12;
    client_header_timeout 12;
    send_timeout          10;

    # ═══════════════════════════════════════════════════════════════════
    # GZIP COMPRESSION
    # ═══════════════════════════════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ═══════════════════════════════════════════════════════════════════
    # RATE LIMITING (DDoS protection)
    # ═══════════════════════════════════════════════════════════════════
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ═══════════════════════════════════════════════════════════════════
    # UPSTREAM DEFINITIONS (Backend Services)
    # ═══════════════════════════════════════════════════════════════════
    upstream gateway_backend {
        server gateway:8000 weight=5;
        keepalive 32;
    }

    upstream rag_backend {
        server mozart-rag:8080;
        keepalive 16;
    }

    # ═══════════════════════════════════════════════════════════════════
    # SERVER BLOCK - Main Application
    # ═══════════════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name localhost mozart.local;

        root /usr/share/nginx/html;
        index index.html;

        # ═══════════════════════════════════════════════════════════════
        # SECURITY HEADERS
        # ═══════════════════════════════════════════════════════════════
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        
        # Content Security Policy (adjust as needed)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http://localhost:* ws://localhost:*;" always;

        # ═══════════════════════════════════════════════════════════════
        # STATIC FILES (Frontend)
        # ═══════════════════════════════════════════════════════════════
        location / {
            limit_req zone=general_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            try_files $uri $uri/ /index.html;
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ═══════════════════════════════════════════════════════════════
        # API PROXY (Gateway)
        # ═══════════════════════════════════════════════════════════════
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            # Rewrite /api/xxx to /xxx
            rewrite ^/api/(.*) /$1 break;

            proxy_pass http://gateway_backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts (allow longer for AI responses)
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
        }

        # ═══════════════════════════════════════════════════════════════
        # DIRECT RAG ACCESS (optional, for debugging)
        # ═══════════════════════════════════════════════════════════════
        location /rag/ {
            limit_req zone=api_limit burst=10 nodelay;
            
            rewrite ^/rag/(.*) /$1 break;
            proxy_pass http://rag_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ═══════════════════════════════════════════════════════════════
        # HEALTH CHECK ENDPOINT
        # ═══════════════════════════════════════════════════════════════
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"mozart-frontend"}';
            add_header Content-Type application/json;
        }

        # ═══════════════════════════════════════════════════════════════
        # ERROR PAGES
        # ═══════════════════════════════════════════════════════════════
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}

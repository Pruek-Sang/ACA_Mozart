# ═══════════════════════════════════════════════════════════════════════════
# Mozart Docker Build & Push - GitHub Actions
# ═══════════════════════════════════════════════════════════════════════════
# Automatically builds and pushes Docker images when code is pushed to main
# Images are pushed to Docker Hub: acatest01/...
# ═══════════════════════════════════════════════════════════════════════════

name: 🐳 Build & Push Docker Images

on:
  # Trigger on push to main branch
  push:
    branches: [main]
    paths:
      - 'Copilot-Mozart/**'
      - 'docker-compose*.yml'
      - '.github/workflows/docker-build.yml'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      build_gateway:
        description: 'Build Gateway image'
        type: boolean
        default: true
      build_frontend:
        description: 'Build Frontend (NGINX) image'
        type: boolean
        default: true

env:
  DOCKERHUB_USERNAME: acatest01
  GATEWAY_IMAGE: acatest01/mozart-gateway
  FRONTEND_IMAGE: acatest01/mozart-frontend

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Build Gateway Image
  # ═══════════════════════════════════════════════════════════════════════
  build-gateway:
    name: 🚀 Build Gateway
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.build_gateway == 'true' }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./Copilot-Mozart/ACA_Mozart-copilot[RAG]
          file: ./Copilot-Mozart/ACA_Mozart-copilot[RAG]/Dockerfile.gateway
          push: true
          tags: |
            ${{ env.GATEWAY_IMAGE }}:latest
            ${{ env.GATEWAY_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Gateway build complete
        run: echo "Gateway image pushed to ${{ env.GATEWAY_IMAGE }}:latest"

  # ═══════════════════════════════════════════════════════════════════════
  # Build Frontend (NGINX) Image
  # ═══════════════════════════════════════════════════════════════════════
  build-frontend:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.build_frontend == 'true' }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ═══════════════════════════════════════════════════════════════════
      # MEMORY LESSON #2: Path [RAG] breaks Docker COPY → copy to simple path first!
      # ═══════════════════════════════════════════════════════════════════
      - name: 📁 Copy frontend to simple path (avoid [RAG] in path)
        run: |
          # Copy frontend source to root (simple path for Docker)
          cp -r "./Copilot-Mozart/ACA_Mozart-copilot[RAG]/frontend" ./frontend-src
          # Copy nginx config to root
          cp "./Copilot-Mozart/ACA_Mozart-copilot[RAG]/Docker/nginx-cloudrun.conf" ./nginx-cloudrun.conf
          # Create .env.production for build
          echo "VITE_API_URL=https://gateway-203658178245.asia-southeast1.run.app" > ./frontend-src/.env.production
          echo "VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> ./frontend-src/.env.production
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> ./frontend-src/.env.production

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ═══════════════════════════════════════════════════════════════════
      # MEMORY LESSON #15: Use no-cache to avoid stale builds
      # ═══════════════════════════════════════════════════════════════════
      - name: 🐳 Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Copilot-Mozart/ACA_Mozart-copilot[RAG]/Docker/Dockerfile.frontend-cloudrun
          push: true
          no-cache: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: ✅ Frontend build complete
        run: echo "Frontend image pushed to ${{ env.FRONTEND_IMAGE }}:latest"

  # ═══════════════════════════════════════════════════════════════════════
  # Summary
  # ═══════════════════════════════════════════════════════════════════════
  summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    needs: [build-gateway, build-frontend]
    if: always()
    
    steps:
      - name: 📋 Print Summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway | ${{ needs.build-gateway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

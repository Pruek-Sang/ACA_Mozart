# 💰 Monthly Price Scraper
# Scrapes electrical equipment prices and commits to prices.csv

name: 💰 Monthly Price Scraper

on:
  schedule:
    # 1st day of every month, 00:00 Thailand Time (UTC+7) = 17:00 UTC previous day
    - cron: '0 17 1 * *'
  workflow_dispatch:  # Allow manual trigger

# 🆕 Fix: Required for git push to work
permissions:
  contents: write

jobs:
  scrape-prices:
    name: 🔍 Scrape Prices
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 📦 Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: 🔍 Run Price Scraper
        id: scrape
        continue-on-error: true
        run: |
          cd mcp_core_v2
          
          # Backup current prices (for fallback)
          if [ -f catalog/prices.csv ]; then
            cp catalog/prices.csv catalog/prices_backup.csv
            echo "📦 Backed up current prices"
          else
            echo "device_code,source,price_thb,unit,url,last_updated" > catalog/prices.csv
          fi
          
          # Try real scraping first
          echo "🔍 Attempting real price scraping..."
          python -m core.price_scraper --update-all --output catalog/prices.csv
          
          # Check if scraping succeeded (file should have more than just header)
          LINE_COUNT=$(wc -l < catalog/prices.csv)
          if [ "$LINE_COUNT" -le 1 ]; then
            echo "⚠️ Real scraping failed or returned no data"
            exit 1
          fi
          
          echo "✅ Successfully scraped $LINE_COUNT price entries"
          head -20 catalog/prices.csv
      
      - name: 🔄 Fallback to Previous Prices
        if: steps.scrape.outcome == 'failure'
        run: |
          cd mcp_core_v2/catalog
          echo "⚠️ Scraping failed - using previous prices"
          
          if [ -f prices_backup.csv ]; then
            cp prices_backup.csv prices.csv
            echo "✅ Restored from backup"
          else
            echo "❌ No backup available - prices remain unchanged"
          fi
          
          # Add warning to commit message
          echo "SCRAPE_FAILED=true" >> $GITHUB_ENV
      
      - name: 📤 Commit & Push prices.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add mcp_core_v2/catalog/prices.csv
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "📋 No price changes detected"
          else
            if [ "$SCRAPE_FAILED" = "true" ]; then
              git commit -m "⚠️ Price update failed $(date +'%Y-%m-%d') - used previous"
            else
              git commit -m "📊 Update prices $(date +'%Y-%m-%d %H:%M') TH"
            fi
            git push
            echo "✅ Prices updated and pushed!"
          fi

  notify-failure:
    name: 🚨 Notify on Failure
    runs-on: ubuntu-latest
    needs: scrape-prices
    if: failure()
    
    steps:
      - name: 🚨 Log Failure
        run: |
          echo "❌ Price scraper failed!"
          echo "Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

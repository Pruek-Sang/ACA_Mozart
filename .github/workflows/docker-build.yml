# ═══════════════════════════════════════════════════════════════════════════
# Mozart Docker Build & Push - GitHub Actions
# ═══════════════════════════════════════════════════════════════════════════
# Automatically builds and pushes Docker images when code is pushed to main
# Images are pushed to Docker Hub: acatest01/...
# ═══════════════════════════════════════════════════════════════════════════

name: 🐳 Build & Push Docker Images

on:
  # Trigger on push to main branch
  push:
    branches: [main]
    paths:
      - 'Copilot-Mozart/**'
      - 'docker-compose*.yml'
      - '.github/workflows/docker-build.yml'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      build_gateway:
        description: 'Build Gateway image'
        type: boolean
        default: true
      build_frontend:
        description: 'Build Frontend (NGINX) image'
        type: boolean
        default: true

env:
  DOCKERHUB_USERNAME: acatest01
  GATEWAY_IMAGE: docker.io/acatest01/mozart-gateway
  FRONTEND_IMAGE: docker.io/acatest01/mozart-frontend
  MCP_CORE_IMAGE: docker.io/acatest01/mcp-core
  RAG_IMAGE: docker.io/acatest01/mozart-rag

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Build Gateway Image
  # ═══════════════════════════════════════════════════════════════════════
  build-gateway:
    name: 🚀 Build Gateway
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.build_gateway == 'true' }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./Copilot-Mozart/ACA_Mozart-copilot[RAG]
          file: ./Copilot-Mozart/ACA_Mozart-copilot[RAG]/Dockerfile.gateway
          push: true
          tags: |
            ${{ env.GATEWAY_IMAGE }}:latest
            ${{ env.GATEWAY_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Gateway build complete
        run: echo "Gateway image pushed to ${{ env.GATEWAY_IMAGE }}:latest"

  # ═══════════════════════════════════════════════════════════════════════
  # Build Frontend (NGINX) Image
  # ═══════════════════════════════════════════════════════════════════════
  build-frontend:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.build_frontend == 'true' }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📁 Copy files to root (avoid special chars in path)
        run: |
          echo "📁 Copying frontend source to ./frontend-src..."
          cp -r "./Copilot-Mozart/ACA_Mozart-copilot[RAG]/frontend_UI_UX/mozart-chat" ./frontend-src
          echo "📁 Copying nginx config..."
          cp "./Copilot-Mozart/ACA_Mozart-copilot[RAG]/Docker/nginx-cloudrun.conf" ./nginx-cloudrun.conf
          echo "📁 Copying Dockerfile..."
          cp "./Copilot-Mozart/ACA_Mozart-copilot[RAG]/Docker/Dockerfile.frontend-cloudrun" ./Dockerfile.frontend-cloudrun
          echo "📋 .env.production contents:"
          cat ./frontend-src/.env.production
          echo "✅ Files ready for Docker build"

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🔐 Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: 🐳 Build Docker image (multi-stage)
        run: |
          echo "🏗️ Building multi-stage Docker image..."
          docker build -f ./Dockerfile.frontend-cloudrun \
            -t asia-southeast1-docker.pkg.dev/gen-lang-client-0658701327/mozart/mozart-frontend:latest \
            -t asia-southeast1-docker.pkg.dev/gen-lang-client-0658701327/mozart/mozart-frontend:${{ github.sha }} \
            .
          echo "✅ Docker build complete"

      - name: 🚀 Push Docker image
        run: |
          docker push asia-southeast1-docker.pkg.dev/gen-lang-client-0658701327/mozart/mozart-frontend:latest
          docker push asia-southeast1-docker.pkg.dev/gen-lang-client-0658701327/mozart/mozart-frontend:${{ github.sha }}

      - name: ✅ Frontend build complete
        run: echo "Frontend image pushed to asia-southeast1-docker.pkg.dev/gen-lang-client-0658701327/mozart/mozart-frontend:latest"


  # ═══════════════════════════════════════════════════════════════════════
  # Build MCP Core Image
  # ═══════════════════════════════════════════════════════════════════════
  build-mcp-core:
    name: ⚡ Build MCP Core
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.build_gateway == 'true' }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push MCP Core
        uses: docker/build-push-action@v5
        with:
          context: ./mcp_core_v2
          file: ./mcp_core_v2/Docker/Dockerfile
          push: true
          tags: |
            ${{ env.MCP_CORE_IMAGE }}:latest
            ${{ env.MCP_CORE_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ MCP Core build complete
        run: echo "MCP Core image pushed to ${{ env.MCP_CORE_IMAGE }}:latest"

  # ═══════════════════════════════════════════════════════════════════════
  # Build Mozart RAG Image
  # ═══════════════════════════════════════════════════════════════════════
  build-rag:
    name: 🧠 Build Mozart RAG
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.build_gateway == 'true' }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push Mozart RAG
        uses: docker/build-push-action@v5
        with:
          context: ./Copilot-Mozart/ACA_Mozart-copilot[RAG]
          file: ./Copilot-Mozart/ACA_Mozart-copilot[RAG]/Docker/Dockerfile_light
          push: true
          tags: |
            ${{ env.RAG_IMAGE }}:latest
            ${{ env.RAG_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Mozart RAG build complete
        run: echo "Mozart RAG image pushed to ${{ env.RAG_IMAGE }}:latest"

  # ═══════════════════════════════════════════════════════════════════════
  # Deploy to Cloud Run (Auto-Deploy after successful build)
  # ═══════════════════════════════════════════════════════════════════════
  deploy-to-cloudrun:
    name: 🚀 Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build-gateway, build-frontend, build-mcp-core, build-rag]
    if: success()  # Only deploy if ALL builds succeed
    
    steps:
      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: aca-mozart

      - name: 🚀 Deploy Gateway to Cloud Run
        run: |
          gcloud run deploy gateway \
            --image ${{ env.GATEWAY_IMAGE }}:${{ github.sha }} \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8000

      - name: 🚀 Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy frontend \
            --image asia-southeast1-docker.pkg.dev/aca-mozart/mozart-images/mozart-frontend:${{ github.sha }} \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --port 80

      - name: 🚀 Deploy MCP Core to Cloud Run
        run: |
          gcloud run deploy mcp-core \
            --image ${{ env.MCP_CORE_IMAGE }}:${{ github.sha }} \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

      - name: 🚀 Deploy Mozart RAG to Cloud Run
        run: |
          gcloud run deploy mozart-rag \
            --image ${{ env.RAG_IMAGE }}:${{ github.sha }} \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8001

      - name: ✅ Deploy complete
        run: |
          echo "🎉 All services deployed to Cloud Run!"
          echo "Gateway: https://gateway-rc5mtgajza-as.a.run.app"
          echo "Frontend: https://frontend-rc5mtgajza-as.a.run.app"

  # ═══════════════════════════════════════════════════════════════════════
  # Summary
  # ═══════════════════════════════════════════════════════════════════════
  summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    needs: [build-gateway, build-frontend, build-mcp-core, build-rag, deploy-to-cloudrun]
    if: always()
    
    steps:
      - name: 📋 Print Summary
        run: |
          echo "## 🐳 Docker Build & Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Build | Deploy |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway | ${{ needs.build-gateway.result }} | ${{ needs.deploy-to-cloudrun.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build-frontend.result }} | ${{ needs.deploy-to-cloudrun.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Core | ${{ needs.build-mcp-core.result }} | ${{ needs.deploy-to-cloudrun.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mozart RAG | ${{ needs.build-rag.result }} | ${{ needs.deploy-to-cloudrun.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY


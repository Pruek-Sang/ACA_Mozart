# ═══════════════════════════════════════════════════════════════════════════
# Mozart Security Scan - OWASP ZAP + Dependency Audit
# ═══════════════════════════════════════════════════════════════════════════
# Runs weekly and on-demand to scan for security vulnerabilities
# ═══════════════════════════════════════════════════════════════════════════

name: 🔒 Security Scan

on:
  # Run weekly on Sunday at 3 AM Thailand time (20:00 UTC Saturday)
  schedule:
    - cron: '0 20 * * 6'
  
  # Allow manual trigger
  workflow_dispatch:

env:
  FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
  RAG_URL: ${{ secrets.RAG_URL }}

jobs:
  owasp-zap:
    name: 🔒 OWASP ZAP Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 OWASP ZAP Baseline Scan - Frontend
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ env.FRONTEND_URL }}
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
        continue-on-error: true

      - name: 🔒 OWASP ZAP Baseline Scan - RAG
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ env.RAG_URL }}
          allow_issue_writing: false
        continue-on-error: true

  dependency-scan:
    name: 🔍 Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔒 Python Dependency Audit
        run: |
          pip install pip-audit safety
          echo "## Python Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Audit main requirements
          for req in $(find . -name "requirements*.txt" -type f | head -5); do
            echo "### Scanning: $req" >> $GITHUB_STEP_SUMMARY
            pip-audit -r "$req" 2>&1 | head -20 >> $GITHUB_STEP_SUMMARY || true
            echo "" >> $GITHUB_STEP_SUMMARY
          done

      - name: 🔒 Node.js Dependency Audit
        run: |
          cd "Copilot-Mozart/ACA_Mozart-copilot[RAG]/frontend"
          echo "## Node.js Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tail -30 >> $GITHUB_STEP_SUMMARY || true

  summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [owasp-zap, dependency-scan]
    if: always()
    
    steps:
      - name: 📊 Create Summary
        run: |
          echo "## 🔒 Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP | ${{ needs.owasp-zap.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════
# Mozart E2E Browser Tests - Playwright
# ═══════════════════════════════════════════════════════════════════════════
# Runs nightly and on-demand to test full browser UI flows
# ═══════════════════════════════════════════════════════════════════════════

name: 🎭 E2E Browser Tests

on:
  # Run nightly at 2 AM Thailand time (19:00 UTC previous day)
  schedule:
    - cron: '0 19 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        type: choice
        options:
          - production
          - staging
        default: production

env:
  FRONTEND_URL: https://frontend-203658178245.asia-southeast1.run.app
  RAG_URL: https://mozart-rag-203658178245.asia-southeast1.run.app

jobs:
  e2e-browser:
    name: 🎭 Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Copilot-Mozart/ACA_Mozart-copilot*/frontend/package-lock.json'

      - name: 📦 Install Playwright
        run: |
          cd "Copilot-Mozart/ACA_Mozart-copilot[RAG]/frontend"
          npm ci
          npx playwright install --with-deps chromium

      - name: 🎭 Run E2E Tests
        run: |
          cd "Copilot-Mozart/ACA_Mozart-copilot[RAG]/frontend"
          npx playwright test e2e/ --reporter=html
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.FRONTEND_URL }}

      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Copilot-Mozart/ACA_Mozart-copilot[RAG]/frontend/playwright-report/
          retention-days: 7

      - name: 📊 Test Summary
        if: always()
        run: |
          echo "## 🎭 E2E Browser Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.FRONTEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

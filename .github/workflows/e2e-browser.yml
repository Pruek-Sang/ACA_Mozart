# ═══════════════════════════════════════════════════════════════════════════
# Mozart E2E Browser Tests - Playwright
# ═══════════════════════════════════════════════════════════════════════════
# Runs nightly and on-demand to test full browser UI flows
# ═══════════════════════════════════════════════════════════════════════════

name: 🎭 E2E Browser Tests

on:
  # Run nightly at 2 AM Thailand time (19:00 UTC previous day)
  schedule:
    - cron: '0 19 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        type: choice
        options:
          - production
          - staging
        default: production

env:
  FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
  RAG_URL: ${{ secrets.RAG_URL }}

jobs:
  e2e-browser:
    name: 🎭 Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        working-directory: Copilot-Mozart/ACA_Mozart-copilot[RAG]/frontend
        run: |
          npm ci
          echo "📦 Dependencies installed"

      - name: 🎭 Install Playwright Browsers
        working-directory: Copilot-Mozart/ACA_Mozart-copilot[RAG]/frontend
        run: |
          npx playwright install chromium --with-deps
          echo "🎭 Playwright browsers installed"

      - name: 🌐 Check Frontend Availability
        run: |
          echo "🌐 Testing frontend availability..."
          curl -s -o /dev/null -w "%{http_code}" ${{ env.FRONTEND_URL }} || echo "Frontend may be down"

      - name: 🎭 Run E2E Tests
        working-directory: Copilot-Mozart/ACA_Mozart-copilot[RAG]/frontend
        run: |
          npx playwright test e2e/ --reporter=html --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.FRONTEND_URL }}

      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Copilot-Mozart/ACA_Mozart-copilot[RAG]/frontend/playwright-report/
          retention-days: 7
          if-no-files-found: warn

      - name: 📊 Test Summary
        if: always()
        run: |
          echo "## 🎭 E2E Browser Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.FRONTEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Note: Tests may fail if the frontend is being redeployed or if login is required." >> $GITHUB_STEP_SUMMARY

